<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Palette Plotting — Maintenance</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf8f5;
        color: #241d20;
        font-family: Arial, Helvetica, sans-serif;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        text-align: center;
      }
      .eyebrow {
        margin: 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #8d8387;
      }
      h1 {
        margin: 12px 0 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 2rem;
        font-weight: 400;
        line-height: 1.2;
      }
      p {
        margin: 16px 0 0;
        font-size: 15px;
        line-height: 1.65;
        color: #5c5256;
      }
      a {
        color: #ad667d;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="eyebrow">Palette Plotting</p>
      <h1>We&rsquo;ll be back shortly</h1>
      <p>
        The site is down for maintenance. Please check back soon.
      </p>
      <p>
        Questions? <a href="mailto:support@paletteplotting.com">support@paletteplotting.com</a>
      </p>
    </div>
  </body>
</html>
